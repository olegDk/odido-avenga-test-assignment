# Pipeline configuration for the zenml/llmops-database dataset.
#
# To run against a different dataset, change `dataset.name` and re-map
# the `fields.*` block to the new column names. The pipeline normalizes
# everything to its internal Item shape, so nothing else needs editing.

dataset:
  name: zenml/llmops-database
  split: train
  config: null
  revision: null

fields:
  # zenml/llmops-database has no stable id column. We point at "id" anyway;
  # _normalize falls back to sha256(source_url + title) when the column
  # is absent, which is stable across runs.
  id: id
  title: title
  text: short_summary    # pre-summarized by ZenML; safe to feed the LLM
  url: source_url
  date: created_at
  source: industry       # 17 classes; better categorization hint than `company`
  score: score           # column absent → ignored, filter sorts by date

filter:
  # The dataset is not refreshed weekly, so a wide window keeps demo runs
  # from producing an empty newsletter. Tighten for a true weekly cadence
  # on a refreshing data source.
  days_back: 90
  max_items: 12
  rank_by_score: false

llm:
  model: claude-haiku-4-5
  max_tokens: 400

newsletter:
  title: "Odido AI Weekly"
  sections:
    - Research Highlights
    - Industry News
    - Cool Use Cases

paths:
  state: data/seen_ids.json
  output_dir: output
  # The V2 brief asks for a sample newsletter named exactly newsletter.md
  # at the repo root. The timestamped copies under output_dir stay as history.
  latest: newsletter.md
  eval_dir: output

personalization:
  # Default profile when --profile is not passed on the CLI.
  default_profile: technical    # one of: technical, non-technical

evaluation:
  # When enabled, every run runs a second LLM pass scoring each summary.
  # Disable to skip and save tokens.
  enabled: true
