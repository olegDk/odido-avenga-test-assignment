name: Weekly Newsletter

on:
  schedule:
    # Mondays at 07:00 UTC (09:00 in Amsterdam during CEST).
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip LLM calls (test the pipeline without spending tokens)"
        required: false
        default: "false"
      profile:
        description: "Reader profile for summary tone"
        required: false
        default: "technical"
        type: choice
        options:
          - technical
          - non-technical

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit newsletter.md + eval + seen_ids back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PYTHONPATH=src python -m newsletter \
            --profile "${{ github.event.inputs.profile || 'technical' }}" \
            $([ "${{ github.event.inputs.dry_run }}" = "true" ] && echo "--dry-run")

      - name: Commit newsletter + state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter.md output/ data/seen_ids.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(newsletter): weekly run $(date -u +%Y-%m-%d)"
            git push
          fi
